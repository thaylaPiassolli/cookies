<!-- Declaração do tipo de documento como HTML5 -->
<!DOCTYPE html>
<!-- Abertura da tag html com idioma português Brasil -->
<html lang="pt-BR">
<!-- Abertura da seção head que contém metadados -->
<head>
    <!-- Define o conjunto de caracteres como UTF-8 para suportar acentos e caracteres especiais -->
    <meta charset="UTF-8">
    <!-- Define viewport para responsividade em diferentes tamanhos de tela -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Define o título da página que aparece na aba do navegador -->
    <title>Cookies 🍪</title>
    <!-- Vincula o arquivo CSS externo para estilização da página -->
    <link rel="stylesheet" href="style.css">
<!-- Fechamento da seção head -->
</head>
<!-- Abertura da seção body onde fica todo conteúdo visível -->
<body>

    <!-- Abertura da seção header (cabeçalho principal da página) -->
    <header>
        <!-- Título principal com emoji de cookie -->
        <h1>🍪Cookie & Cia🍪</h1>
        <!-- Parágrafo descritivo do negócio -->
        <p>Os melhores cookies artesanais da cidade!</p>

        <!-- Botão para alternar entre modo claro e escuro com id para javascript -->
        <button id="temaBtn">
            <!-- Emoji e texto do botão tema escuro -->
            🌙 Modo Escuro
        </button>
    </header>

    <!-- Abertura da seção main com conteúdo principal -->
    <main>

        <!-- Seção banner com imagem de destaque -->
        <section class="banner">
            <!-- Imagem de banner de cookies do Unsplash -->
            <img src="https://images.unsplash.com/photo-1499636136210-6f4ee915583e?w=1200"
                alt="Cookies">
        </section>

        <!-- Seção que contém os cards de produtos -->
        <section class="produtos">

            <!-- Card do primeiro produto Chocolate -->
            <div class="card">
                <!-- Imagem do cookie de chocolate -->
                <img src="https://images.unsplash.com/photo-1558961363-fa8fdf82db35?w=400" alt="">
                <!-- Nome do produto -->
                <h2>Chocolate</h2>
                <!-- Descrição do produto -->
                <p>Cookie recheado com gotas de chocolate.</p>
                <!-- Preço do produto -->
                <span>R$ 8,00</span>
            </div>

            <!-- Card do segundo produto Nutella -->
            <div class="card">
                <!-- Imagem do cookie Nutella -->
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTMvecR2ANnz0so1QJiDUOzQRgLzDDUzfVieg&s" alt="">
                <!-- Nome do produto -->
                <h2>Nutella</h2>
                <!-- Descrição do produto -->
                <p>Cookie com recheio cremoso de Nutella.</p>
                <!-- Preço do produto -->
                <span>R$ 10,00</span>
            </div>

            <!-- Card do terceiro produto Red Velvet -->
            <div class="card">
                <!-- Imagem do cookie Red Velvet -->
                <img src= "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSd9sGcz7lHP7pkKSH6QNzB7xWooFfuJKp6HA&salt" alt="">
                <!-- Nome do produto -->
                <h2>Red Velvet</h2>
                <!-- Descrição do produto -->
                <p>Cookie especial com chocolate branco.</p>
                <!-- Preço do produto -->
                <span>R$ 12,00</span>
            </div>

        <!-- Fechamento da seção de produtos -->
        </section>

    <!-- Fechamento da seção main -->
    </main>

    <!-- Seção footer (rodapé) da página -->
    <footer>
        <!-- Texto descritivo do propósito da página -->
        <p>🍪 Exemplo didático de uso de Cookies em JavaScript</p>
    </footer>

    <!-- Vincula o arquivo JavaScript externo para adicionar funcionalidades -->
    <script src="script.js"></script>

<!-- Fechamento da tag body -->
</body>
<!-- Fechamento da tag html -->
</html>
